services:
  postgres:
    image: postgres:17.9-trixie
    container_name: quickhire-postgres
    restart: always
    environment:
      POSTGRES_DB: QuickHireDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: